<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gujarat Vidyapith - Academic Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fffaf0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-bg {
            background-color: #3e2723;
            color: white;
            padding: 50px 0;
            text-align: center;
            border-bottom: 5px solid #d2b48c;
        }
        
        /* FIX: Equal Height Container */
        .faculty-box {
            background-color: white;
            border: 1px solid #654321;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            transition: transform 0.3s;
            
            /* Ensures the box takes up all available vertical space in the row */
            height: 100%;
            display: flex;
            flex-direction: column;
        }
        
        .faculty-box:hover {
            transform: translateY(-8px);
        }

        .faculty-title {
            font-size: 1.25rem;
            font-weight: bold;
            color: #3e2723;
            margin-bottom: 15px;
            border-bottom: 2px solid #d2b48c;
            padding-bottom: 10px;
            
            /* FIX: Ensures titles occupy the same vertical space */
            min-height: 4rem; 
            display: flex;
            align-items: center;
        }

        .dept-container {
            flex-grow: 1; /* Pushes everything up and fills the middle space */
        }

        .dept-item {
            background-color: #f3e5f5;
            color: #3e2723;
            padding: 10px 15px;
            margin: 8px 0;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s;
        }
        .dept-item:hover {
            background-color: #654321;
            color: white;
        }
        .course-card {
            background-color: white;
            border: 2px solid #654321;
            border-radius: 10px;
            padding: 25px;
            margin: 15px 0;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            height: 100%;
        }
        .course-card:hover {
            background-color: #fdf5e6;
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .semester-btn {
            background-color: #5d4037 !important;
            color: white !important;
        }
        .semester-btn:not(.collapsed) {
            background-color: #3e2723 !important;
        }
        .subject-list {
            list-style: none;
            padding: 0;
        }
        .subject-list li {
            background: #e8f5e9;
            margin: 8px 0;
            padding: 10px;
            border-radius: 6px;
            border-left: 4px solid #4caf50;
        }
        .table-upasana { background-color: #fff3e0; font-weight: bold; }
        .table-break { background-color: #eceff1; text-align: center; font-weight: bold; }
        .lecture-slot { background-color: #e3f2fd; }
    </style>
</head>
<body>

    <div id="main-page">
        <header class="hero-bg">
            <div class="container">
                <h1>Gujarat Vidyapith</h1>
                <p class="lead">Established by Mahatma Gandhi - 1920</p>
            </div>
        </header>
        <div class="container my-5">
            <div class="row g-4" id="faculties-container">
                </div>
        </div>
    </div>

    <div id="department-page" class="container my-5 d-none">
        <div class="hero-bg p-4 rounded mb-4">
            <h2 id="dept-title"></h2>
            <button class="btn btn-outline-light btn-sm mt-2" onclick="goBackToMain()">← Back to Faculties</button>
        </div>
        <div class="row g-4" id="courses-container"></div>
    </div>

    <div id="course-detail-page" class="container my-5 d-none">
        <div class="hero-bg p-4 rounded mb-4">
            <h2 id="course-title"></h2>
            <button class="btn btn-outline-light btn-sm mt-2" onclick="goBackToDepartment()">← Back to Courses</button>
        </div>
        <div class="accordion" id="semesters-accordion"></div>
    </div>

    <script>
        const faculties = [
            { name: "Language and Literature", departments: [
                { name: "English", courses: ["BA English", "MA English"] },
                { name: "Gujarati", courses: ["BA Gujarati", "MA Gujarati"] },
                { name: "Hindi", courses: ["BA Hindi", "MA Hindi"] }
            ]},
            { name: "Social Sciences", departments: [
                { name: "Rural Economics", courses: ["MA Rural Economics"] },
                { name: "History and Culture", courses: ["MA History"] },
                { name: "Sociology", courses: ["MA Sociology"] },
                { name: "Gandhi Darshan", courses: ["MA Gandhian Studies"] },
                { name: "Social Work", courses: ["MSW"] }
            ]},
            { name: "Education & Yog", departments: [
                { name: "Education", courses: ["B.Ed", "M.Ed"] },
                { name: "Yogic Science", courses: ["MA Yoga", "Diploma in Yoga"] }
            ]},
            { name: "Physical Education", departments: [
                { name: "Physical Education", courses: ["B.P.Ed", "M.P.Ed"] }
            ]},
            { name: "Science", departments: [
                { name: "Microbiology", courses: ["B.Sc Microbiology", "M.Sc Microbiology"] },
                { name: "Food & Nutrition", courses: ["M.Sc Food & Nutrition"] }
            ]},
            { name: "ICT & Media", departments: [
                { name: "Computer Science", courses: ["BCA", "MCA"] },
                { name: "Journalism", courses: ["BJMC", "MJMC"] },
                { name: "Library Science", courses: ["B.Lib.I.Sc"] }
            ]},
            { name: "Management", departments: [
                { name: "Rural Management", courses: ["MBA (RM)"] },
                { name: "Commerce", courses: ["B.Com", "M.Com"] }
            ]}
        ];

        const courseSubjects = {
            "BCA": {
                1: ["Fundamentals of Computer", "Programming in C", "HTML & Web Design", "Mathematics-I", "Communication Skills"],
                2: ["Data Structures", "DBMS", "Java Programming", "Mathematics-II", "Environmental Studies"],
                3: ["OOP with C++", "Operating Systems", "Web Technology", "Computer Networks", "Soft Skills"],
                4: ["Core Java", "Software Engineering", "PHP & MySQL", "Computer Graphics", "Project Work"],
                5: ["Advanced Java", "Python Programming", "Android Development", "Cyber Security", "Elective"],
                6: ["Cloud Computing", "Big Data", "Machine Learning Intro", "Major Project", "Internship"]
            },
            "default": {
                1: ["Core Subject 1", "Core Subject 2", "Core Subject 3", "Foundation"],
                2: ["Core Subject 4", "Core Subject 5", "Elective", "Practical"],
                3: ["Advanced Theory", "Lab Work", "Seminar"],
                4: ["Specialization", "Project Work", "Viva"]
            }
        };

        const dayWiseTimetable = `
            <div class="table-responsive mt-3">
                <table class="table table-bordered text-center align-middle shadow-sm">
                    <thead class="table-dark">
                        <tr><th>Time</th><th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th></tr>
                    </thead>
                    <tbody>
                        <tr class="table-upasana"><td>10:30-11:00</td><td colspan="6">🙏 Upashna</td></tr>
                        <tr class="lecture-slot"><td>11:00-12:00</td><td>Sub 1</td><td>Sub 2</td><td>Sub 3</td><td>Sub 4</td><td>Sub 5</td><td>Lab</td></tr>
                        <tr class="lecture-slot"><td>12:00-01:00</td><td>Sub 2</td><td>Sub 3</td><td>Sub 4</td><td>Sub 5</td><td>Sub 1</td><td>Lab</td></tr>
                        <tr class="table-break"><td>01:00-02:00</td><td colspan="6">🍱 Lunch</td></tr>
                        <tr class="lecture-slot"><td>02:00-05:00</td><td colspan="5">Practical / Lab Work</td><td>Activity</td></tr>
                    </tbody>
                </table>
            </div>`;

        function renderFaculties() {
            const container = document.getElementById('faculties-container');
            container.innerHTML = '';
            faculties.forEach(f => {
                let deptsHtml = f.departments.map(d => 
                    `<div class="dept-item" onclick='showDepartment("${d.name}", ${JSON.stringify(d.courses)})'>${d.name}</div>`
                ).join('');

                container.innerHTML += `
                    <div class="col-md-4 d-flex align-items-stretch">
                        <div class="faculty-box w-100">
                            <div class="faculty-title">${f.name}</div>
                            <div class="dept-container">
                                ${deptsHtml}
                            </div>
                        </div>
                    </div>`;
            });
        }

        function showDepartment(name, courses) {
            document.getElementById('dept-title').textContent = "Department of " + name;
            document.getElementById('main-page').classList.add('d-none');
            document.getElementById('department-page').classList.remove('d-none');
            const container = document.getElementById('courses-container');
            container.innerHTML = courses.map(c => `
                <div class="col-md-4">
                    <div class="course-card" onclick='showCourseDetail("${c}")'>
                        <h4>${c}</h4>
                        <p class="text-muted">Click for details</p>
                    </div>
                </div>`).join('');
        }

        function showCourseDetail(course) {
            document.getElementById('course-title').textContent = course;
            document.getElementById('department-page').classList.add('d-none');
            document.getElementById('course-detail-page').classList.remove('d-none');
            const accordion = document.getElementById('semesters-accordion');
            accordion.innerHTML = '';

            const subjects = courseSubjects[course] || courseSubjects["default"];
            const sems = (course === "MCA" || course === "MSW") ? 4 : 6;

            for (let i = 1; i <= sems; i++) {
                const subList = subjects[i] || ["Subject details updated soon"];
                accordion.innerHTML += `
                    <div class="accordion-item mb-2 border">
                        <h2 class="accordion-header">
                            <button class="accordion-button semester-btn collapsed" data-bs-toggle="collapse" data-bs-target="#s${i}">
                                Semester ${i}
                            </button>
                        </h2>
                        <div id="s${i}" class="accordion-collapse collapse">
                            <div class="accordion-body">
                                <h6>Current Subjects:</h6>
                                <ul class="subject-list">
                                    ${subList.map(s => `<li>${s}</li>`).join('')}
                                </ul>
                                ${dayWiseTimetable}
                            </div>
                        </div>
                    </div>`;
            }
        }

        function goBackToMain() {
            document.getElementById('department-page').classList.add('d-none');
            document.getElementById('main-page').classList.remove('d-none');
        }

        function goBackToDepartment() {
            document.getElementById('course-detail-page').classList.add('d-none');
            document.getElementById('department-page').classList.remove('d-none');
        }

        renderFaculties();
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
